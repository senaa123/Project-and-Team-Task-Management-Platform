<svg viewBox="0 0 1350 900" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <rect width="1350" height="900" fill="#FFFFFF"/>

  <text x="675" y="60" text-anchor="middle" fill="#16233A" font-size="34" font-weight="700">Entity Relationship Diagram</text>
  <text x="675" y="95" text-anchor="middle" fill="#3B6591" font-size="18" font-style="italic">Taskify — Project &amp; Team Task Management Platform</text>

  <!-- USER -->
  <g transform="translate(60,140)">
    <rect width="260" height="300" rx="12" fill="#FFFFFF" stroke="#1F3350" stroke-width="2"/>
    <rect width="260" height="40" rx="12" fill="#1F3350"/>
    <rect y="20" width="260" height="20" fill="#1F3350"/>
    <text x="130" y="27" text-anchor="middle" fill="#FFFFFF" font-size="16" font-weight="700">User</text>
    <text x="16" y="62" fill="#3B6591" font-size="13" font-weight="700">PK  id : uuid</text>
    <text x="16" y="86" fill="#16233A" font-size="13">empId : string (unique)</text>
    <text x="16" y="110" fill="#16233A" font-size="13">name : string</text>
    <text x="16" y="134" fill="#16233A" font-size="13">email : string (unique)</text>
    <text x="16" y="158" fill="#16233A" font-size="13">passwordHash : string</text>
    <text x="16" y="182" fill="#16233A" font-size="13">isVerified : boolean (default false)</text>
    <text x="16" y="206" fill="#16233A" font-size="13">role : enum(Role) (default PENDING)</text>
    <text x="16" y="230" fill="#16233A" font-size="13">createdAt : datetime</text>
    <text x="16" y="258" fill="#5B84A8" font-size="11.5" font-style="italic">Role: ADMIN | PROJECT_MANAGER |</text>
    <text x="16" y="272" fill="#5B84A8" font-size="11.5" font-style="italic">TEAM_MEMBER | PENDING</text>
  </g>

  <!-- PROJECT -->
  <g transform="translate(540,140)">
    <rect width="260" height="200" rx="12" fill="#FFFFFF" stroke="#1F3350" stroke-width="2"/>
    <rect width="260" height="40" rx="12" fill="#1F3350"/>
    <rect y="20" width="260" height="20" fill="#1F3350"/>
    <text x="130" y="27" text-anchor="middle" fill="#FFFFFF" font-size="16" font-weight="700">Project</text>
    <text x="16" y="62" fill="#3B6591" font-size="13" font-weight="700">PK  id : uuid</text>
    <text x="16" y="86" fill="#16233A" font-size="13">name : string</text>
    <text x="16" y="110" fill="#16233A" font-size="13">description : string?</text>
    <text x="16" y="134" fill="#5B84A8" font-size="13" font-weight="700">FK  ownerId → User.id</text>
    <text x="16" y="158" fill="#16233A" font-size="13">createdAt : datetime</text>
  </g>

  <!-- PROJECT MEMBER (junction) -->
  <g transform="translate(340,420)">
    <rect width="260" height="160" rx="12" fill="#FFFFFF" stroke="#5B84A8" stroke-width="2"/>
    <rect width="260" height="40" rx="12" fill="#5B84A8"/>
    <rect y="20" width="260" height="20" fill="#5B84A8"/>
    <text x="130" y="27" text-anchor="middle" fill="#FFFFFF" font-size="16" font-weight="700">ProjectMember</text>
    <text x="16" y="62" fill="#3B6591" font-size="13" font-weight="700">PK  id : uuid</text>
    <text x="16" y="86" fill="#5B84A8" font-size="13" font-weight="700">FK  projectId → Project.id</text>
    <text x="16" y="110" fill="#5B84A8" font-size="13" font-weight="700">FK  userId → User.id</text>
    <text x="16" y="140" fill="#5B84A8" font-size="11.5" font-style="italic">unique(projectId, userId)</text>
  </g>

  <!-- TASK -->
  <g transform="translate(800,420)">
    <rect width="270" height="280" rx="12" fill="#FFFFFF" stroke="#1F3350" stroke-width="2"/>
    <rect width="270" height="40" rx="12" fill="#1F3350"/>
    <rect y="20" width="270" height="20" fill="#1F3350"/>
    <text x="135" y="27" text-anchor="middle" fill="#FFFFFF" font-size="16" font-weight="700">Task</text>
    <text x="16" y="62" fill="#3B6591" font-size="13" font-weight="700">PK  id : uuid</text>
    <text x="16" y="86" fill="#5B84A8" font-size="13" font-weight="700">FK  projectId → Project.id</text>
    <text x="16" y="110" fill="#16233A" font-size="13">title : string</text>
    <text x="16" y="134" fill="#16233A" font-size="13">description : string?</text>
    <text x="16" y="158" fill="#16233A" font-size="13">status : enum(TaskStatus)</text>
    <text x="16" y="182" fill="#16233A" font-size="13">priority : string</text>
    <text x="16" y="206" fill="#5B84A8" font-size="13" font-weight="700">FK  assigneeId → User.id?</text>
    <text x="16" y="230" fill="#16233A" font-size="13">dueDate : datetime?</text>
    <text x="16" y="254" fill="#16233A" font-size="13">createdAt : datetime</text>
    <text x="16" y="272" fill="#5B84A8" font-size="11" font-style="italic">Status: TODO | IN_PROGRESS | IN_REVIEW | DONE</text>
  </g>

  <!-- TASK COMMENT -->
  <g transform="translate(800,750)">
    <rect width="270" height="0" fill="none"/>
  </g>
  <g transform="translate(1090,140)">
    <rect width="230" height="180" rx="12" fill="#FFFFFF" stroke="#5B84A8" stroke-width="2"/>
    <rect width="230" height="40" rx="12" fill="#5B84A8"/>
    <rect y="20" width="230" height="20" fill="#5B84A8"/>
    <text x="115" y="27" text-anchor="middle" fill="#FFFFFF" font-size="16" font-weight="700">TaskComment</text>
    <text x="16" y="62" fill="#3B6591" font-size="13" font-weight="700">PK  id : uuid</text>
    <text x="16" y="86" fill="#5B84A8" font-size="12.5" font-weight="700">FK  taskId → Task.id</text>
    <text x="16" y="110" fill="#5B84A8" font-size="12.5" font-weight="700">FK  userId → User.id</text>
    <text x="16" y="134" fill="#16233A" font-size="13">comment : text</text>
    <text x="16" y="158" fill="#16233A" font-size="13">createdAt : datetime</text>
  </g>

  <!-- ACTIVITY LOG -->
  <g transform="translate(60,450)">
    <rect width="230" height="160" rx="12" fill="#FFFFFF" stroke="#5B84A8" stroke-width="2"/>
    <rect width="230" height="40" rx="12" fill="#5B84A8"/>
    <rect y="20" width="230" height="20" fill="#5B84A8"/>
    <text x="115" y="27" text-anchor="middle" fill="#FFFFFF" font-size="16" font-weight="700">ActivityLog</text>
    <text x="16" y="62" fill="#3B6591" font-size="13" font-weight="700">PK  id : uuid</text>
    <text x="16" y="86" fill="#5B84A8" font-size="12.5" font-weight="700">FK  userId → User.id</text>
    <text x="16" y="110" fill="#16233A" font-size="12.5">action : string</text>
    <text x="16" y="134" fill="#16233A" font-size="12.5">entityType / entityId</text>
  </g>

  <!-- Relationship lines with cardinality -->
  <!-- User -> Project (owner) -->
  <line x1="320" y1="190" x2="540" y2="190" stroke="#1F3350" stroke-width="1.5"/>
  <text x="330" y="182" fill="#16233A" font-size="12" font-weight="700">1</text>
  <text x="520" y="182" fill="#16233A" font-size="12" font-weight="700">M</text>

  <!-- User -> ProjectMember -->
  <line x1="270" y1="440" x2="410" y2="422" stroke="#1F3350" stroke-width="1.5"/>
  <text x="278" y="436" fill="#16233A" font-size="12" font-weight="700">1</text>
  <text x="390" y="418" fill="#16233A" font-size="12" font-weight="700">M</text>

  <!-- Project -> ProjectMember -->
  <line x1="600" y1="340" x2="530" y2="420" stroke="#1F3350" stroke-width="1.5"/>
  <text x="590" y="358" fill="#16233A" font-size="12" font-weight="700">1</text>
  <text x="540" y="415" fill="#16233A" font-size="12" font-weight="700">M</text>

  <!-- Project -> Task -->
  <line x1="730" y1="250" x2="900" y2="418" stroke="#1F3350" stroke-width="1.5"/>
  <text x="740" y="268" fill="#16233A" font-size="12" font-weight="700">1</text>
  <text x="880" y="413" fill="#16233A" font-size="12" font-weight="700">M</text>

  <!-- User -> Task (assignee) -->
  <line x1="320" y1="250" x2="800" y2="530" stroke="#1F3350" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="335" y="265" fill="#16233A" font-size="12" font-weight="700">1</text>
  <text x="780" y="525" fill="#16233A" font-size="12" font-weight="700">M (optional)</text>

  <!-- Task -> TaskComment -->
  <line x1="1070" y1="440" x2="1150" y2="320" stroke="#1F3350" stroke-width="1.5"/>
  <text x="1075" y="400" fill="#16233A" font-size="12" font-weight="700">1</text>
  <text x="1130" y="330" fill="#16233A" font-size="12" font-weight="700">M</text>

  <!-- User -> ActivityLog -->
  <line x1="170" y1="440" x2="170" y2="450" stroke="#1F3350" stroke-width="1.5"/>
  <text x="178" y="437" fill="#16233A" font-size="11" font-weight="700">1</text>
  <text x="178" y="460" fill="#16233A" font-size="11" font-weight="700">M</text>

  <!-- Footer note -->
  <text x="60" y="850" fill="#16233A" font-size="13" font-style="italic">All primary keys are UUIDs. Dashed lines denote optional (nullable) foreign key relationships.</text>
</svg>
