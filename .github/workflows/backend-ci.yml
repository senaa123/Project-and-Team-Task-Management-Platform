# ─────────────────────────────────────────────────────────────────────────────
# Backend CI  ·  NestJS + Prisma
#
# Triggers on pushes / PRs to `main` that touch the `backend/` directory.
# Steps: install → type-check → lint → generate Prisma client → test → build
# ─────────────────────────────────────────────────────────────────────────────

name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'   # re-run if the pipeline itself changes
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'

jobs:
  ci:
    name: Build & Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      # ── 1. Source ────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node ──────────────────────────────────────────────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      # ── 3. Dependencies ──────────────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 4. Type-check  (catches TS errors before lint/test) ──────────────────
      - name: TypeScript type-check
        run: npx tsc --noEmit

      # ── 5. Lint ──────────────────────────────────────────────────────────────
      #  Use --max-warnings 0 so any lint warning fails the pipeline
      - name: Run ESLint
        run: npx eslint "{src,apps,libs,test}/**/*.ts" --max-warnings 0

      # ── 6. Prisma client ─────────────────────────────────────────────────────
      #  Generate the Prisma client from schema (no DB connection required)
      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci_db"

      # ── 7. Unit tests ────────────────────────────────────────────────────────
      - name: Run unit tests
        run: npm run test -- --passWithNoTests --forceExit
        env:
          DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci_db"
          JWT_SECRET: "ci-test-secret"

      # ── 8. Production build ──────────────────────────────────────────────────
      - name: Build NestJS app
        run: npm run build
