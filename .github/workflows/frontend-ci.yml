# ─────────────────────────────────────────────────────────────────────────────
# Frontend CI  ·  Next.js
#
# Triggers on pushes / PRs to `main` that touch the `frontend/` directory.
# Steps: install → type-check → lint → build (with stub env vars)
# ─────────────────────────────────────────────────────────────────────────────

name: Frontend CI

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'

jobs:
  ci:
    name: Lint & Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      # ── 1. Source ────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node ──────────────────────────────────────────────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # ── 3. Dependencies ──────────────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 4. Type-check ────────────────────────────────────────────────────────
      - name: TypeScript type-check
        run: npx tsc --noEmit

      # ── 5. Lint ──────────────────────────────────────────────────────────────
      - name: Run ESLint
        run: npm run lint

      # ── 6. Production build ──────────────────────────────────────────────────
      #  next build validates routes, RSC, and catches import errors.
      #  NEXT_PUBLIC_API_URL is required at build-time; use the real Render URL
      #  once deployed, or keep the placeholder for CI-only validation.
      - name: Build Next.js app
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL || 'https://placeholder-api-url.com' }}
          # Silence Next.js telemetry in CI
          NEXT_TELEMETRY_DISABLED: 1
